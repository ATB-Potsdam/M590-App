<!DOCTYPE html>
<meta charset="utf-8" />
<title>polylookup WASM test</title>
<script type="module">
    import init, { WasmLayer } from "./pkg/polylookup.js";

    async function main() {
        await init(); // loads the .wasm
        // Fetch your 2 MB .fgb from same origin (or bundle it alongside)
        const bytes = await (
            await fetch("./data/Klimaräume.fgb")
        ).arrayBuffer();
        const layer = WasmLayer.loadLayerFromBytes(new Uint8Array(bytes));

        for (const location of [
            [13.4178058, 52.5167835, -252],
            [9.7122609, 53.3178489, -125],
            [12.1246426, 53.1517263, -204],
            [9.0993541, 53.6832796, -82],
            [8.9982722, 53.9532901, -48],
            [7.3289732, 51.2156759, 1],
            [7.4053921, 51.2062917, 71],
            [12.7623675, 50.915663, -166],
        ]) {
            const json = layer.queryPointJSON(location[0], location[1]);
            const matches = JSON.parse(json);
            const div = document.createElement("div");
            div.innerHTML = `<strong>${location[0]}, ${location[1]}</strong>: `;
            if (Array.isArray(matches)) {
                if (matches[0].kwb === location[2]) {
                    div.innerHTML += `<span style="color: green;">SUCCESS</span> (${matches[0].kwb})`;
                } else {
                    div.innerHTML += `<span style="color: red;">FAILED</span> (Expected ${location[2]}, got ${matches[0].kwb})`;
                }
            } else {
                div.innerHTML += `<span style="color: red;">FAILED</span> (Expected ${location[2]}, got no matches)`;
            }
            document.body.appendChild(div);
        }
    }
    main();
</script>
